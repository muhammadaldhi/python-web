<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GATEWAY // NETRUNNER_AUTH</title>
    <style>
      :root {
        --bg-color: #0a0a12;
        --panel-bg: #121222;
        --neon-cyan: #00f0ff;
        --neon-magenta: #ff0055;
        --neon-green: #39ff14;
        --text-color: #e0e0ff;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Courier New", Courier, monospace;
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: radial-gradient(rgba(18, 18, 34, 0.8) 15%, transparent 16%);
        background-size: 20px 20px;
        overflow: hidden;
      }

      .login-card {
        background: var(--panel-bg);
        border: 2px solid var(--neon-magenta);
        box-shadow: 0 0 25px rgba(255, 0, 85, 0.4);
        padding: 40px;
        width: 100%;
        max-width: 400px;
        border-radius: 4px;
        text-align: center;
        position: relative;
      }

      .login-card::before {
        content: "SECURITY_GATE //";
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 0.7rem;
        color: rgba(255, 0, 85, 0.5);
      }

      h1 {
        color: var(--neon-cyan);
        font-size: 1.6rem;
        letter-spacing: 3px;
        margin-bottom: 30px;
        text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
      }

      .form-group {
        margin-bottom: 25px;
        text-align: left;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.85rem;
        color: #aaaaff;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      input[type="password"] {
        width: 100%;
        background: #05050a;
        border: 1px solid var(--neon-cyan);
        padding: 12px;
        color: var(--neon-green);
        font-family: inherit;
        font-size: 1.1rem;
        box-sizing: border-box;
        border-radius: 2px;
        letter-spacing: 4px;
        text-align: center;
        transition: all 0.3s;
      }

      input[type="password"]:focus {
        outline: none;
        border-color: var(--neon-magenta);
        box-shadow: 0 0 12px rgba(255, 0, 85, 0.6);
      }

      .btn-auth {
        width: 100%;
        background: transparent;
        color: var(--neon-magenta);
        border: 2px solid var(--neon-magenta);
        padding: 12px;
        font-size: 1rem;
        font-family: inherit;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s;
      }

      .btn-auth:hover {
        background: var(--neon-magenta);
        color: #000;
        box-shadow: 0 0 15px var(--neon-magenta);
      }

      .flash-msg {
        background: rgba(255, 0, 85, 0.15);
        border: 1px dashed var(--neon-magenta);
        color: #ff3333;
        padding: 10px;
        font-size: 0.8rem;
        margin-bottom: 20px;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>CORE_INTERFACE_AUTH</h1>
      
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="flash-msg">[!] {{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>ENTER INTERFACE PASSKEY</label>
          <input type="password" name="password" autocomplete="off" required autofocus />
        </div>
        <button type="submit" class="btn-auth">GRANT_ACCESS_></button>
      </form>
    </div>
  </body>
</html>
